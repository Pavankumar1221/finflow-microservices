# File: admin-service.yml (in GitHub config repo root)

server:
  port: 7007

spring:
  application:
    name: admin-service
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  datasource:
    url: jdbc:mysql://localhost:3306/finflow_admin?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: pavan
    password: Pavan@2004
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: BASIC
  circuitbreaker:
    enabled: true

resilience4j:
  circuitbreaker:
    instances:
      applicationServiceCB:
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
      documentServiceCB:
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
      authServiceCB:
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
  retry:
    instances:
      applicationServiceCB:
        maxAttempts: 3
        waitDuration: 2s
      documentServiceCB:
        maxAttempts: 3
        waitDuration: 2s
      authServiceCB:
        maxAttempts: 3
        waitDuration: 2s

finflow:
  mail:
    enabled: ${FINFLOW_MAIL_ENABLED:false}
    from: ${FINFLOW_MAIL_FROM:${MAIL_USERNAME:no-reply@finflow.local}}

info:
  app:
    name: FinFlow Admin Service
    description: Admin review, loan decisions, document verification and audit
    version: 1.0.0
