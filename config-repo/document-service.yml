# File: document-service.yml (in GitHub config repo root)

server:
  port: 7006

spring:
  application:
    name: document-service
  datasource:
    url: jdbc:mysql://localhost:3306/finflow_document?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: pavan
    password: Pavan@2004
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 30MB

document:
  upload:
    path: C:/finflow/documents/

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: BASIC
  circuitbreaker:
    enabled: true


resilience4j:
  circuitbreaker:
    instances:
      applicationServiceCB:
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
  retry:
    instances:
      applicationServiceCB:
        maxAttempts: 3
        waitDuration: 2s

info:
  app:
    name: FinFlow Document Service
    description: Handles document upload, storage metadata and verification
    version: 1.0.0
