server:
  port: 7007

spring:
  application:
    name: admin-service
  config:
    import: "optional:configserver:http://localhost:7001"
  datasource:
    url: jdbc:mysql://localhost:3306/finflow_admin?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: pavan
    password: Pavan@2004
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    service-url:
      defaultZone: http://localhost:7002/eureka/
  instance:
    prefer-ip-address: true

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: BASIC
  circuitbreaker:
    enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.finflow.admin: DEBUG
    feign: DEBUG
