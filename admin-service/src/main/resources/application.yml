server:
  port: 7007

spring:
  application:
    name: admin-service
  config:
    import: optional:configserver:http://localhost:7001
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  datasource:
    url: jdbc:mysql://localhost:3306/finflow_admin?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: pavan
    password: Pavan@2004
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    service-url:
      defaultZone: http://localhost:7002/eureka/
  instance:
    prefer-ip-address: true

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: BASIC
  circuitbreaker:
    enabled: true

resilience4j:
  circuitbreaker:
    instances:
      applicationServiceCB:
        failureRateThreshold: 50
        slidingWindowSize: 10
        waitDurationInOpenState: 10s
      documentServiceCB:
        failureRateThreshold: 50
        slidingWindowSize: 10
        waitDurationInOpenState: 10s
      authServiceCB:
        failureRateThreshold: 50
        slidingWindowSize: 10
        waitDurationInOpenState: 10s
  retry:
    instances:
      applicationServiceCB:
        maxAttempts: 3
        waitDuration: 2s
      documentServiceCB:
        maxAttempts: 3
        waitDuration: 2s
      authServiceCB:
        maxAttempts: 3
        waitDuration: 2s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.finflow.admin: DEBUG
    feign: DEBUG
  loki:
    url: http://localhost:3100/loki/api/v1/push

finflow:
  mail:
    enabled: ${FINFLOW_MAIL_ENABLED:false}
    from: ${FINFLOW_MAIL_FROM:${MAIL_USERNAME:no-reply@finflow.local}}
